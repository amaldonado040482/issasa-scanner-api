function ef(id,d){
var n=function(v){return parseFloat(v)||0};
switch(id){
case ‘rsi’: var r=n(d.rsi); return {p:r>0&&r<30,v:r?r.toFixed(1):‘N/D’};
case ‘boll’: var pr=n(d.price),bl=n(d.bb_lower),pc=bl>0?((pr-bl)/bl*100):null; return {p:pc!==null&&pc<=2,v:pc!==null?pc.toFixed(1)+’%’:‘N/D’};
case ‘macd’: return {p:d.macd_divergence===true,v:d.macd_divergence?‘Si’:‘No’};
case ‘vol’: var v=n(d.volume),a=n(d.avg_volume_20d),rt=a>0?v/a:0; return {p:rt>=1.5,v:rt>0?rt.toFixed(1)+‘x’:‘N/D’};
case ‘sma200’: var p2=n(d.price),s2=n(d.sma200),pc2=s2>0?((p2-s2)/s2*100):null; return {p:pc2!==null&&pc2>0,v:pc2!==null?(pc2>0?’+’:’’)+pc2.toFixed(1)+’%’:‘N/D’};
case ‘sup’: var p3=n(d.price),sp=n(d.support_level),pc3=sp>0?Math.abs((p3-sp)/sp*100):null; return {p:pc3!==null&&pc3<=3,v:pc3!==null?pc3.toFixed(1)+’%’:‘N/D’};
case ‘gc’: var s5=n(d.sma50),s20=n(d.sma200); return {p:s5>0&&s20>0&&s5>s20,v:(s5>0&&s20>0)?(s5>s20?‘Si’:‘No’):‘N/D’};
case ‘hl’: return {p:d.higher_lows===true,v:d.higher_lows?‘Si’:‘No’};
case ‘rsir’: var rr=n(d.rsi),rp=n(d.rsi_prev); return {p:rr<35&&rr>rp,v:(rr&&rp)?rp.toFixed(1)+’->’+rr.toFixed(1):‘N/D’};
case ‘mom’: var cp=n(d.price),p5=n(d.price_5d_ago),ret=p5>0?((cp-p5)/p5*100):null; return {p:ret!==null&&ret>=-2,v:ret!==null?(ret>0?’+’:’’)+ret.toFixed(2)+’%’:‘N/D’};
case ‘pe’: var pe=n(d.pe_ratio),spe=n(d.sector_pe); return {p:pe>0&&spe>0&&pe<spe,v:pe>0?pe.toFixed(1)+‘x’:‘N/D’};
case ‘pb’: var pb=n(d.pb_ratio); return {p:pb>0&&pb<1.5,v:pb>0?pb.toFixed(2)+‘x’:‘N/D’};
case ‘de’: var de=n(d.debt_equity); return {p:de>=0&&de<0.5,v:de>=0?de.toFixed(2)+‘x’:‘N/D’};
case ‘roe’: var ro=n(d.roe); return {p:ro>15,v:ro>0?ro.toFixed(1)+’%’:‘N/D’};
case ‘eps’: var eg=n(d.eps_growth); return {p:eg>0,v:eg!==0?(eg>0?’+’:’’)+eg.toFixed(1)+’%’:‘N/D’};
case ‘cr’: var crv=n(d.current_ratio); return {p:crv>=1.5,v:crv>0?crv.toFixed(2)+‘x’:‘N/D’};
case ‘nm’: var nm=n(d.net_margin); return {p:nm>8,v:nm!==0?nm.toFixed(1)+’%’:‘N/D’};
case ‘rg’: var rg=n(d.revenue_growth); return {p:rg>5,v:rg!==0?(rg>0?’+’:’’)+rg.toFixed(1)+’%’:‘N/D’};
case ‘smom’: var sm=n(d.sector_momentum); return {p:sm>0,v:sm!==0?(sm>0?’+’:’’)+sm.toFixed(1)+’%’:‘N/D’};
case ‘mc’: var mc=n(d.market_cap); return {p:mc>=500e6,v:mc>0?’$’+(mc/1e9).toFixed(1)+‘B’:‘N/D’};
default: return {p:false,v:‘N/D’};
}
}

function scoreAsset(data){
var res=[],tot=0,mx=0;
for(var i=0;i<FILTERS.length;i++){
var f=FILTERS[i],ev=ef(f.id,data),pts=ev.p?f.weight:0;
tot+=pts;mx+=f.weight;
res.push({id:f.id,cat:f.cat,label:f.label,weight:f.weight,p:ev.p,v:ev.v,pts:pts});
}
var s=Math.round((tot/mx)*100);
return {score:s,passed:res.filter(function(r){return r.p}).length,total:FILTERS.length,results:res,totalPts:tot,maxPts:mx};
}

function signalPlan(s,data){
var rp=s>=75?3:s>=60?5:8,tp=s>=75?15:s>=60?10:6,pr=parseFloat(data.price)||0;

}

var RAILWAY_API=‘https://issasa-scanner-api-production.up.railway.app’;

function fetchAsset(item,cb){
var ticker=item.ticker;

// Check cache first (6h TTL)
var cached=FCACHE.get(ticker);
if(cached){cb(Object.assign({},item,cached,{isFMP:true,isMock:false}));return;}

var done=false;
var timer=setTimeout(function(){
if(!done){done=true;cb(Object.assign({},item,mockData(ticker,item.sector)));}
},15000);

function fail(){if(!done){done=true;clearTimeout(timer);cb(Object.assign({},item,mockData(ticker,item.sector)));}}

var sectorPe=SPE[item.sector]||18;
fetch(RAILWAY_API+’/api/scan?ticker=’+encodeURIComponent(ticker)+’&sectorPe=’+sectorPe)
.then(function(r){if(!r.ok){fail();return null;}return r.json();})
.then(function(d){
if(!d||d.liveError||!d.price){fail();return;}
// Generate sparkline from hist52w if available, else derive
if(!d.hist52w||d.hist52w.length<2){
var hist=[];
var lo=d.low_52w||d.price*0.8, hi=d.high_52w||d.price*1.2;
for(var i=0;i<40;i++){var t=i/39;hist.push(+(lo+(d.price-lo)*(t+0.15*Math.sin(t*12))).toFixed(2));}
d.hist52w=hist;
}
d.sector_pe=sectorPe;
d.isFMP=true;
d.isMock=false;
FCACHE.set(ticker,d);
if(!done){done=true;clearTimeout(timer);cb(Object.assign({},item,d));}
})
.catch(function(){fail();});
}

function buildRows(assets){
return assets.map(function(a){
var sc2=scoreAsset(a),sig=signalPlan(sc2.score,a);
var conv=sc2.score>=75?‘A+’:sc2.score>=68?‘A’:sc2.score>=60?‘B+’:sc2.score>=50?‘B’:‘C’;
var d52=a.high_52w?((a.price-a.high_52w)/a.high_52w*100):null;
var vr=a.avg_volume_20d?a.volume/a.avg_volume_20d:null;
var setup=‘Mixto’;
if((a.rsi||99)<30&&(vr||0)>=1.3)setup=‘Capitulacion+vol’;
else if((a.rsi||99)<35&&a.macd_divergence)setup=‘Reversion temprana’;
else if((a.sma50||0)>(a.sma200||0)&&(a.change_pct||0)>0)setup=‘Continuacion’;
return Object.assign({},a,{sc:sc2,sig:sig,conv:conv,d52:d52,vr:vr,setup:setup});
}).sort(function(a,b){return (b.sc.score||0)-(a.sc.score||0)});
}

function doScan(){
if(ST.loading)return;
var u=getUniverse();
if(!u.length){ST.rows=[];R();return;}
ST.loading=true;ST.rows=[];R();
var res=[],cnt=0;
u.forEach(function(item,idx){
fetchAsset(item,function(asset){
res[idx]=asset;cnt++;
if(cnt===u.length){
ST.rows=buildRows(res.filter(Boolean));
ST.loading=false;
ST.lastScan=new Date().toISOString();
R();
}
});
});
}
